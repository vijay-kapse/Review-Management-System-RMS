<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMS Login</title>
  <link rel="icon" type="image/svg+xml" href="assets/logos/rms-favicon.svg" />
  <link rel="shortcut icon" href="assets/logos/rms-favicon.svg" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .card {
      width: min(680px, 100%);
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      background: white;
      padding: 28px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
    }
    .logo {
      display: block;
      width: min(320px, 100%);
      height: auto;
      margin: 0 0 22px;
    }
    h1 { margin: 0 0 10px; }
    p { margin: 0 0 18px; color: #475569; line-height: 1.6; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 800;
      text-decoration: none;
    }
    .primary { background: #0f172a; color: white; }
    .secondary { border: 1px solid #cbd5e1; color: #0f172a; background: #f8fafc; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/logos/rms-logo.svg" alt="RMS - Review Management System" />
    <h1>RMS Login</h1>
    <p>This fallback page keeps everything on the current RMS domain. Use the server-rendered login route for account sign-in.</p>
    <div class="actions">
      <a class="primary" href="/login">Continue to RMS login</a>
      <a class="secondary" href="/">Back to RMS home</a>
    </div>
  </main>
</body>
</html>
