<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">RMS logo</title>
  <desc id="desc">Review Management System logo with four connected research workflow panels.</desc>
  <defs>
    <linearGradient id="rms-panel" x1="24" y1="18" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="rms-accent" x1="55" y1="42" x2="132" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset=".48" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <g filter="url(#soft-shadow)">
    <rect x="28" y="24" width="132" height="132" rx="30" fill="url(#rms-panel)"/>
    <rect x="50" y="46" width="34" height="34" rx="10" fill="#60a5fa"/>
    <rect x="104" y="46" width="34" height="34" rx="10" fill="#14b8a6"/>
    <rect x="50" y="100" width="34" height="34" rx="10" fill="#f59e0b"/>
    <rect x="104" y="100" width="34" height="34" rx="10" fill="#e2e8f0"/>
    <path d="M67 63h54v54H67z" fill="none" stroke="url(#rms-accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M75 113l13 13 29-37" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g fill="#111827">
    <text x="190" y="88" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="58" font-weight="800">RMS</text>
    <text x="193" y="124" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Review Management System</text>
    <text x="194" y="151" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748b">TRACE  ARGUS  QUEST  SPARK</text>
  </g>
</svg>
