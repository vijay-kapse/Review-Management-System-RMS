  <desc id="desc">SPARK logo with a survey checklist and academic research spark.</desc>
  <defs>
    <linearGradient id="spark-bg" x1="22" y1="18" x2="124" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <filter id="spark-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#c2410c" flood-opacity=".18"/>
